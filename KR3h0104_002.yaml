body:
  text: 堯星出翼舜龍負圖堯星出翼舜龍負圖孫氏瑞應圖曰景星或如半月或如星中空或如赤氣先月出西方故曰天見景精明王出號令合人心制禮合人意則見星於晦朔助日光也堯時出翼舜時出房景德也其狀無常有道之國王者無私之應也春秋運斗樞曰舜以太尉受禪即位五年二月東巡狩至於中舟與三公諸侯臨觀黃龍五色負圖出置舜前以黃玉為匣如櫝長三尺廣八寸厚一寸四合而連有戶此合樞紐之命龍匣皆黃也四合有輯道相入也有戶言開閉也白玉檢黃金繩黃金艾為泥封之瑞章曰天章帝符璽五字廣袤各三寸深四分鳥文舜與三公大司空禹等三十人集發圖玄色而綈狀可卷舒長三十尺廣九尺中有七十二帝地形之制天文宮序位列分度若天日月五星變齊一角獸梁三足烏孫氏瑞應圖曰一角瑞獸也六合同歸則至熊氏瑞應圖曰天下太平則一角獸至蕭于齊書曰武帝永明十年鄱陽獲一角獸麟首鹿形龍鸞共色抱樸子曰三足烏日之精也日為太陽其精為烏而三足梁大同起居注曰九年豫州剌史侯慜明表稱忽見眾鳥連群數百集於楊樹飛繞其巢往視之獲三足烏以獻詔付華林園養之群鴉飛翔鳴繞三足烏乃啣食往哺五老河遊萬歲山呼論語讖曰仲尼云吾聞堯舜等遊首山觀河渚有五老遊河渚將來告帝期五老曰河圖將歸造帝謀三老曰河圖將來造帝書四老曰河圖將來告帝圖山川煥張聖人恩五老曰河圖將來告帝浮龍金泥玉檢封成書五老飛為流星上入昴宋均曰浮龍龍浮水也漢書曰武帝封禪山呼萬歲黃金為泥白銀為繩告太平於天下群臣之功也觸邪獬豸除害騊駼孫氏瑞應圖曰王者獄訟平獬豸至王充論衡曰獬豸者神奇之獸為瑞應也許氏說文曰其狀如牛一角四足似熊薰苞輿服志或曰如羊蓋神羊也神異經曰獬豸色青田俅子曰堯時獲之緝其皮以為帳論衡曰皋陶治獄其罪疑者令一角羊觸有罪則觸無罪則否故皋陶治獄平敬羊跪坐事之山海經曰騊駼幽隱之獸也其狀如馬出於北海孫氏瑞應圖曰有明王則騊駼來為時辟除災害熊氏瑞應圖曰王者德感則騊駼至周書王會曰成王時愚氏來獻騊駼也真人何黃馬鬣何朱孫氏瑞應圖曰黃真人守曰水國方自隆也熊氏瑞應圖曰王者在上則白馬赤鬣至禮斗威儀曰周文王時白馬朱鬣山海經曰白馬赤鬣出大封之國乘之壽三千歲文馬縞衣身朱鬣者也酋耳若豹比翼如鳧周書王會曰成王時英林獻酋耳酋耳者身若虎豹尾長其身食虎豹山海經曰比翼一名鶼鶼一名蠻其狀如鳧一翼一目色青赤處於南山昆吾金門之山詰胸國東不比不飛孫氏瑞應圖曰王者德及高遠則比翼鳥至又曰王者有孝德則至禹獲玄珪順反明珠孫氏瑞應圖曰王者勤苦以應天下厚人而薄已水泉通四海會同則玄珪出夏禹之時卑宮室盡力溝壑天賜以玄珪禮斗威儀曰人君乘金而王其政象平海出明珠孝經援神契曰王者德及淵泉則海出明珠東觀漢記曰順帝永安四年漢陽率善都尉滿密因桂陽太守文礱獻大明珠詔曰海內頗歲害異而礱不惟竭忠而喻明珠之求也求媚煩擾令封珠還滿密蓂莢夾階萐莆生廚孫氏瑞應圖曰蓂莢瑞草也蓋神靈之嘉瑞也白虎通曰月朔日生一莖十五日而生十五莖十六日日落一莢帝王世紀曰及晦而盡若月小則餘一莢厭而不落以是占日月之數一名厤莢堯時夾階而生逐月而死白虎通曰萐莆者樹名也其狀如蓬枝多根如絲葉如扇不搖自動轉而生風至於飲食清涼驅殺蟲蠅以助供養也一名倚萐一名倚扇一名實賓櫚春秋潛潭巴曰君臣和德道度叶中則孳於庖廚孝經援神契曰王者德至山陵則阜出孫氏瑞應圖曰王者不徵味庖廚不踰粢盛則生於廚也田俅子曰昔帝堯之為天下平也出庖廚為帝去惡孫氏瑞應圖又曰冬則死夏則生虞舜即政又生庖廚也麟蓋玄枵鳳銜赤苻公羊傳曰麒麟仁獸也春秋考異圖曰麟蓋玄枵之陰精也亦曰歲星散而為麟蓋木之精也牝曰麒牡曰麟孫氏瑞應圖曰麟不踐生蟲不折生草不入坑穽不觸羅網食嘉禾之實飲珠玉之英鶡冠子曰鳳凰鶉火之鳥也太陽之精春秋合讖圖曰堯坐中舟與太尉舜臨觀鳳皇負圖以赤玉為匣長三尺廣八寸厚一寸玉檢白繩封兩端以紫芝為泥曰天赤帝苻璽五字深四分廣袤三寸圖以赤色為染白為文也鸞表帝軒龜感有虞尚書候曰軒轅之世聖德提象配永循機鸞鳥來儀世紀曰舜即天子位洛出龜六十五字是為洪範所謂洛書非煙五起榮光四鋪史記曰若煙非煙若雲非雲郁郁紛紛蕭索輪菌是為卿雲尚書中候曰堯即位七十載景星出翼鳳皇止庭朱草生郊嘉禾孳連甘露潤液醴泉出山脩壇河洛榮光出河休氣四塞榮光者五色出河也美氣四塞炫燿白雲起廻風援馬銜押赤文綠色龍形象馬赤帝標怒之使所以藏文赤文綠地也茲白食豹騰黃似狐周書王會曰成王時義渠獻茲白茲白者若白馬鐻齒食虎豹山海經曰六駿之狀如此又曰騰黃亦曰飛黃其狀如狐出白民之國孫氏瑞應圖曰王者德御四方輿服有度秣馬不過所業則地出乘黃世紀虞舜時出周書王會曰成王時白民獻乘黃也玉馬光澤金車耀途孫氏瑞應圖曰王者六律調五聲節制致因時治道則玉馬來一本為玉澤馬熊氏瑞應圖曰王者清明脩理則見孫氏瑞應圖曰王者至行仁德廣施則金車出又曰帝舜則德盛金車出於庭也何背瑇瑁何鉤珊瑚孝經援神契曰神靈滋液百珍寶用有瑇瑁背宋均曰瑇瑁水蟲如龜而背有文又曰神靈滋液百珍寶用有蘇胡鉤宋均曰王者得信則出孫氏瑞應圖曰王者恭信即見一本云王者不玩弄則見也吉利鳥形鱉封獸軀孫氏瑞應圖曰吉利鳥形獸頭也周書王會曰成王時區易獻鱉封者若彘前後有首黑文又曰鹿螯山獸左右有首名并蓬郭璞曰即并封是也何為鳶白何為鷄趍晉中興書曰孝宗永和九年吳郡獻白鳶孫氏瑞應圖曰雞趍王者有德則見也獸卻魍魎麟降匈奴東方朔十洲記曰天漢三年西國王獻犬使者曰王於先天林而請猛獸卻百邪走魍魎或生崑崙或生玄圃其壽不訾食草飲露當其仁也愛及蠢動不犯虎豹當其威也一聲發吼千人怵息牛馬百物驚斷當其神也立起風雲吐嗽雨霧息於天王之林家於太山之廄後御師子其名猛獸元帝使人喚一聲如天之大雷霹靂漢書曰武帝太始三年郊見上帝西登隴首獲白麟以繢宗廟元首元年幸雍祀五畤獲白麟之歌終軍對曰野獸并角明同本也殆將有解辮髮削左袵襲冠冕要衣裳而象化者由是改元曰元狩數月越地及匈奴名王來降平露安傾屈軼安指白虎通曰平露樹名也孫氏瑞應圖曰狀如車蓋生於庭以候四方之正其國正平則正一方不正則不應一方稍傾也其根若絲一名平慮王者慈仁則生春秋潛潭巴曰君臣和德道度叶中則生於庭白虎通曰賢不肖位不相踰亦生於庭田俅子曰黃帝時常有草生於庭階若佞人入朝則草屈而指之名曰屈軼草是以佞人不敢進也具區文蜃陵屈角鯉周書王會曰成王時具區獻文蜃吳之震澤也蜃蚌蛤之類今海中小蛤亦有文者雕鏤彪炳異常所見山海經曰龍魚陵居狀如鯉一曰鰕魚即有神聖乘此以行九野郭璞曰似鯉魚而一角也朱草復生白象不死白虎通曰朱草赤草也蓋百草之精抱樸子曰其狀如桑栽長三四尺枝葉皆丹莖如珊瑚生名巖之下剋之汁流如麪感精符曰王者德洽於地則朱草廣生孝經援神契曰王者德至草木則生宋均曰食之令人不老淮南子曰堯德清平則生舜時又生孝經援神契曰周公踐祚理政與天合朱草生東觀漢紀曰光武中元元年有赤草生於水涯魏略曰文帝欲授禪有朱草生文昌殿前宋紀曰文帝元嘉十一年朱草生益州鄲縣孫氏瑞應圖曰王者政教得於四方則白象至一本云人君自養有節則負不死藥而來周書王會曰成王時南人獻白象韓子曰黃帝合鬼神於泰山駕象車說文曰其狀如皎白六牙道貴德遠兵故多卷凡象牙垂白以和疆熊氏瑞應圖曰神靈滋液百珍寶用白象宋均曰色白如素也宋書曰文帝元嘉元年見零陵兆陽也嘉禾孳莖芣苡宜子白虎通曰嘉禾太和之為美瑞一名導司馬相如封禪書曰導一莖六種於扈典略曰蓋五榖之長稔歲之精也晉中興書曰或異敏同穎或孳連數穗或一稃二米以應質文也孫氏瑞應圖曰王者德茂嘉禾生一本云世太平則生又曰德茂則二苗共秀而生帝紀曰神農時嘉禾生徐整三五歷曰黃帝時嘉禾為糧尚書中候曰帝堯清平比隆伏羲嘉禾孳連春秋說題辭曰嘉禾之孳七莖長五尺至世五穗以成德也孫氏瑞應圖曰夏時盛德二本而同秀殷湯德洽則二秀而同本周書王會曰成王時康民獻芣苡如李實食之宜子也赤虎導騶白狼度水宋紀曰文帝元嘉世五年益州騶虞見二赤虎為導又曰王懿與慕容垂戰敗逃叛雨水暴漲津徑斷絕忽有白狼走至懿前仰天而號訖度水懿循狼跡而過鄭玄注尚書中候曰白狼金精鳥狀前赤牛生上齒漢書曰宣帝西河築世宗廟於是有一鳥狀如鶴前赤後青地鏡曰世主治而益地則牛生上齒𧄸芑白苗芝英黃裹毛詩曰誕生后稷克岐克嶷以就口實誕降嘉種惟𧄸惟芑毛萇曰𧄸赤苗芑白苗論衡曰芝英紫色之芝也其栽如豆宋紀曰順帝昇明二年臨城縣生紫芝一株蓋黃裏采掇歷時色不變也臨江之橘九巖之梓宋紀曰明帝泰始六年臨江縣橘樹生子蓋江北生子則為瑞齊書曰徐伯珍太末人也隱居九巖山門前忽生梓樹一年便合論者以為隱德之感宋之黑麞晉之白鹿宋起居注曰文帝時獲黑麞晉中興書曰元帝太始四年白鹿二見于南昌蓋白麇之流也又曰孝武帝太明元年見會稽諸暨因獲之以獻蔓竹常生珊瑚連理禮稽命徵曰王者禮得其宜則蔓竹爰簫生於廟禮斗威儀曰人君乘土而王其政太平則蔓竹常生宋紀曰孝武帝太明六年鬱林郡獻珊瑚連理也龜毛何白魚目何比齊書曰宋昇明三年太祖為齊王白毛龜見東府城池中尚書中候曰古之王者將興封禪則東海進比目魚孫氏瑞應圖曰王者明德幽遠則比目魚見熊氏瑞應圖曰王者循敬則比目魚見鄭康成郭景純皆云狀如斗脾細鱗紫黑色一眼兩片相合乃能行今吳中東海之形狀與此說相苻合吳人謂之板魚或呼為鰈爾雅曰鰈青比目魚也出於東海不比不行也豫章之桐秣陵之李范甯集為豫章太守表白永循公國相萬至解稱至縣西北出二里有林林中有梧桐樹下根相去二丈上枝相去一丈八尺連合成一齊書曰永明四年秣陵有李樹連理又曰僧秀園中四樹共為一株胡為委威胡為延喜孫氏瑞應圖曰君臣各有禮節上哀下下奉上則委威生一本云王者禮至則生又云王者愛人命則生孝經援神契曰王者孝德刑于四海德洞淪冥八方化神並榮延喜也又曰王者德及山陵則出孫氏瑞應圖曰王孝道則見也貝若車渠龜游卷耳孝經援神契曰王者德至淵泉則江出大貝尚書大傳曰貝自江出大若車渠文王拘羑里散宜生之江淮取大貝如車渠以獻紂免西伯之難白虎通曰靈龜者神龜也黑神之精五色鮮明知存亡明吉兇故食氣而神三百歲遊於渠葉之上三千歲遊於卷耳之上醴泉地出神鼎味生孫氏瑞應圖曰王者德及地則醴泉出狀如醴酒可以養志水之精也典略曰神鼎者質文之精知吉兇存亡能輕重行息墨子曰神鼎不灼自熟不爨自沸不汲自滿五味生焉孫氏瑞應圖曰神鼎金銅之精也蜚廉應行肉芝辟兵春秋潛潭巴曰王者清廉則蜚廉之草生宋均曰言瑞應之物應行而生孫氏瑞應圖曰獼猴萬歲頭上有角額有丹書八字名之曰肉芝畫地則水流佩之則辟兵也巨海止波渾河載清熊氏瑞應圖曰周公攝政有迅雷疾風海不揚波孔叢子曰天將降嘉應河水先清三日清變白白變黑黑變黃各三日河水清則天下太平丹甑孰爨玉甕孰盈孝經援神契曰神靈滋液百珍寶有丹甑見孫氏瑞應圖曰五榖豐則丹甑出一本云淫巧棄則丹甑出熊氏瑞應圖曰四夷賓則玉甕入國一本云王者飲食不流離下賤則出也山車誰造蒿柱誰營孫氏瑞應圖曰山車自然之車也蓋山藏之精禮斗威儀曰人君乘木而王其政昇平則山車垂勾勾者曲也不揉而自圓曲故曰垂勾春秋運斗樞曰瑤光得則山出神車禮記曰聖人用則必從天不愛其道地不藏其寶山出器車大戴禮曰周德澤和洽蒿茂大可以為宮室柱故名曰蒿宮也周匝曷至富貴曷名孫氏瑞應圖曰周匝神獸也知星宿之變化王者德盛則至又曰富貴者鳥形獸頭也鵷雛海上鸑鷟山鳴三輔決錄注曰鵷雛者鳳之屬南方之禽狀如鳳五色而多黃莊子曰常登乎南海止乎北海非練實不食非醴泉不飲山海經曰南隅之山有鳳鳥雛鸑鷟神鳥也賈逵云亦鳳之屬皇甫謐逸士傳曰狀如鳳五色而多黃國語曰周之興也鸑鷟鳴於岐山也殷自銀溢漢見玉英漢書曰殷金德銀自山溢吳孫皓天冊元年吳都掘得長一尺廣三寸刻上有年月字號晉中興書曰玉英神寶也不琢自成光白若月華禮含文嘉曰君有常則玉石自明孝經援神契曰神靈滋液百珍寶用有玉英宋均曰尊卑不失其服則玉石有英華色也史記曰新垣平說文帝立渭陽五廟欲出周鼎而育玉英見宗廟福草章和華平禮斗威儀曰人君乘木而王其政升平則福草生於廟中宋均曰朱草之別名也熊氏瑞應圖曰宗廟肅敬則福草生宗廟中孫氏瑞應圖曰華平瑞草也其政升平則生王者德強則仰弱則低孝經援神契曰王者德至於地則盛宋均曰華平應政平也孫氏瑞應圖曰王者政令均則生東觀漢記曰章和中有華平生也淮茅三脊草芝散莖周書王會曰成王時奇幹獻善茅皆鄉善者國語曰齊桓公封管仲曰昔者封禪鄗上之黍北里之禾以為盛江淮之間有一茅三脊以為藉史記曰漢孝武帝封泰山淂江淮一茅三脊為神藉宋書曰武帝大明元年三脊茅生西岸江夏王義恭表勸封禪孫氏瑞應圖曰王者慈仁則芝草生東觀漢記曰皇帝建和元年芝草生中黃藏府桀襲神芝贊曰魏明帝青龍元年神芝生於長平之習陽評昌典農中郎蔣元以聞其色丹紫為質光耀長尺有八寸五分本圍三寸三分上別為三幹分為九支散為三十六莖莖圍一寸九分葉徑三寸七分枝幹洪纖連屬有似珊瑚乃詔御府藏之宜且畫形遂名其圖也狐何九尾獸何六足孝經援神契曰神靈滋液百珍寶用狐九尾山海經曰四足九尾出青丘之國音如嬰兒食不蠱郭璞曰太平則出噉其肉不逢妖邪或曰蠱毒白虎通曰九妃得子孫繁昌則至於尾者明後當盛也汲冡周書伯杼子往于東海至于三壽得一狐九尾田俅子曰殷湯為天子白狐九尾陳思王表曰植于鄄城北十里道傍草中見異獸如狐而大馬輒驚不行司馬丁升常從孫鵠觀之見眾狐數千在前後有一大狐長七尺赤紫色見人視之舉頭樹尾尾甚長大然後知其九尾也孫氏瑞應圖曰先法脩明三才得所見九尾狐至又曰王者謀及眾庶則六足獸至麟何獲金鳳何集玉漢書曰武帝太始二年詔曰朕郊見上帝西登隴首獲白麟饋宗廟渥洼水出天馬泰山見黃金更名黃金麟趾馬蹄以協祥也又曰先帝幸河東之明年鳳皇集祋祤於所集得玉寶起步壽之宮史記禇先生云淂寶璧玉器也白澤應德烏車效祥孫氏瑞應圖曰白澤者皇帝時巡狩至于東海白澤見出能言語達知方物之精以戒於民為時除害則賢君明德則至熊氏瑞應圖曰烏車山之精瑞車也孫氏瑞應圖曰王者德澤流洽於四境則烏車出赤喙騕䮍縞身吉量漢書音義曰騕䮍者馬也赤喙黑耳孫氏瑞應圖曰行三萬里各隨其方而至以明君德也山海經曰吉量馬名也周書曰一名吉黃之乘六韜曰一名雞斯之乘山海經曰一曰文馬縞身朱鬣目若黃金出太封之國乘之壽三千歲孫氏瑞應圖曰王者不儲秣馬則白馬朱鬣赤髦任賢良則見又曰明者則來六韜曰文王囚於羑里散宜生至犬戎得文馬九六獻紂免西伯之難周書王會曰成王時犬戎獻文馬名曰吉黃之乘也白鳩濟南黃雀日旁古今注曰周成時白鳩見而天下鳩合者也漢書曰平帝時濟南鳩至白子晉左貴嬪有鳩賦孫氏瑞應圖曰祭五岳四瀆得其宜則黃雀集黃帝將起有黃雀赤頭立日旁帝占曰黃者玉精赤者火精黃雀者賞萌余當王也河精握武天鹿浮光孫氏瑞應圖曰河精水神也人頭魚身握武修文感夏禹而出又曰天鹿者純靈之獸也五色光耀洞明漢書音義曰天鹿者一角長尾其兩角者辟邪無角者名扶郊一名桃友孫氏瑞應圖曰王者孝道備則至也䘏䘏封城蛩蛩西方周書王會曰成王時封人獻䘏䘏若龜而長喙孫氏瑞應圖曰王者德及幽隱矜寡得所則蛩蛩鉅虛至一本云王者安平則至爾雅曰蟨與蛩蛩鉅虛比為蛩蛩鉅虛囓甘草即有難蛩蛩鉅虛負而走出於西方不比不行說苑曰其狀如鼠后是兔也小何生大馬何生羊孫氏瑞應圖曰王者土地開闢則小鳥生大鳥紂時雀生鸇於城隅史占之以小鳥生大鳥天下必安紂介雀之瑞而不脩德居年乃作璇宮瓊室野王按紂時則周興之瑞也戰國策賈誼新書云宋康王時有雀生鸇鶉小生巨是伯王天下也康王大喜不修德行遂死魏志曰黃初中有燕生鷹口爪皆赤又曰景初元年有燕生鷔於衛國形若鷹吻似燕高堂隆云此魏室之大興宜防鷹揚之臣也後晉宣王興都魏晉瑞也京房易占曰田邑無憂民人安馬則生羊也瓶甕誰汲浪井誰揚典略曰瓶甕瑞器也不汲而自滿孫氏瑞應圖曰王者清廉則瓶甕出一曰王者接於下則瓶甕見又曰浪井不鑿而自成者清淨則水流有仙人主之也白雀二集黃鵠群翔宋書曰車駕南巡肆水師於中山二白雀集於華蓋齊書曰徐伯珍隱於九巖山有白雀一雙棲其戶牖論者曰以為隱德之感春秋繁露曰恩及羽蟲則飛鳥大為黃鵠出見如鳳皇翔也東觀漢記曰章帝元和二年巡狩至岱宗燔柴望祀畢有黃鵠從西南來壇上東北過于宮翱翔而上柹歸黑虎華林白麞爾雅曰黑虎者一名𧈜說文音騰山海經曰出於幽都山晉書曰懷帝永和四年建平柹歸檻得黑虎狀如小虎而黑毛深者為斑文晉中興書曰白麞赤鹿也孫氏瑞應圖曰王者刑罰得理則至一本云王者德盛則至宋書少帝景平元年義興太守王準之獻白麞又明年又見南郊太守王華獻之太祖以為休祥廿五年華林園養白麞生二白子淮南瑯琊並獻漢獻帝延康元年見晉武帝太始中見宋咸寧九年又見也膏露何甘德星何黃白虎通曰甘露美露也孫氏瑞應圖曰蓋神露之精也晉中興書曰仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒禮稽命徵曰稱謚政名則葦竹柏受甘露孝經援神契曰王者德至天則甘露降降以中和宋均曰不得中和之氣則不降魏志曰漢桓帝時有黃星見楚宋之分遼東殷馗善天文言五十年有真人起於梁沛之間其鋒不可當至五十年後而曹破袁紹天下莫敵越裳黑雉散宜白狼漢書曰平帝元始元年越裳重譯而至獻黑雉二以薦宗廟爾後四年金城塞外羌獻魚鹽之地得西王母石室以為西海郡六韜曰文王囚羑里散宜生得白狼獻紂免西伯之難十二層檉五丈高桑齊書曰武帝永明五年山陰孔廣園檉樹十二層太守隨王子隆以獻植于芳林苑鳳光殿前蜀志曰先主少時舍東南角籬上有桑生高五丈餘望之重重如小車蓋見者皆怪之非凡或云當出貴也房戶連闊肅慎雒常白虎通曰賓連闊者樹名也狀連累相承又曰王者繼嗣平則賓連生房戶故生房戶象繼嗣也孫氏瑞應圖曰王者厥機有序男女有別則生房室一本云生于房室象后妃有節也山海經曰肅慎有樹名曰雒常光人伐于此取衣郭璞曰其俗無衣中國有聖帝代立者則此木生皮可衣也胡為福并胡為威香孫氏瑞應圖曰福并草也王者有德則生又曰威香瑞草也王者禮備則生于殿前又曰王者愛人則生白猴來續赤貍免昌梁天監起居注曰四年交州刺史阮研表言林邑王范續之書稱七八年觀望天風云中國有聖王臣州來朝乞內附并致一巨白猴帝王世紀曰周文王拘羑里散宜生於西海得赤貍以獻紂免西伯之難周文王即西伯也名昌彭城青毛力牧玄距齊書曰武帝永明五年武騎常侍唐僣上青毛神龜一頭七年六月彭城郡田中獲青毛龜中軍訣曰黃帝伐蚩尤未免愁怨乃睡夢王母遣道人被玄狐之裘以苻授之曰太乙在前天乙備後得兵苻信戰即克矣黃帝寐思其苻不能悉意以告風后力牧曰此天應也雖不得其信戰必自克力牧俱于威水之側立墠祭以太牢有頃玄龜距鼇啣苻從水中出置壇中而去黃帝再拜稽首授苻視之乃所夢之苻也色青如皮非皮如綈以血為廣三寸五分袤一尺黃帝以擒蚩尤也蠶則野繭穀則田櫓東觀漢記曰光武建武二年野穀自生野蠶自繭披于山阜民收其利其後耘蠶稍廣二物漸息吳書曰黃龍二年野蠶成繭大如卵齊書曰高帝建元二年郢州監利縣天井湖水色忽澄清山綿百姓採以為纊武帝永明三年護軍府門外𢸙樹一株並有蠶絲綿被莖東觀漢記曰光武建武二年野穀櫓生五年彌多章帝章和元年嘉穀孳生吳志曰大帝黃龍元年由拳縣稻自生梁起居注曰大通三年吳興野穀櫓生布漫山澤百姓獲利塗山玄豹江陵白鼠六韜曰文王囚羑里散宜生至宛懷塗山得玄豹獻紂免西伯之難周書王會曰成王時屠州獻玄豹宋書曰高帝建元二年江陵獲白鼠武帝永明六年白鼠見芳林抱樸子曰鼠壽三歲滿百歲則色白梁天監起居注曰元年袞州剌史吳平侯獻白鼠三十一年郢州刺史豫章王孫獻白鼠一枚藉藁光晉萍實得渡晉中興書曰元帝初誕有神光之異所藉之草如新刈家語曰楚昭王渡江得一物大如斗員赤如日直觸王舟舟人取獻王問群臣莫識使使問孔子孔子曰此所謂萍實也王肅曰水草也可割而食之吉祥也惟伯者為能獲焉使者反王食之大夫魯大夫因子游問曰何以知其然孔子曰吾昔之鄭過乎陳野聞童謠曰楚王渡江得萍實大如斗赤如日割而食之甜如蜜楚之瑞也嘉苽曲河連蓮玄圃東觀漢記曰章帝元和中有嘉苽生又曰安帝元初三年東平陵有苽異處同蒂桓帝建和三年嘉苽兩體同蒂梁起居注曰天監五年晉陵太守孫廉表曲連獲嘉苽三蒂同莖宋紀曰文帝元嘉七年連蓮生建康湖一莖兩花十七芙蓉同蒂孝武帝大明五年生樂游苑二房一蒂太始六年雙蓮一花生宮玄圃池梁天監起居注曰三年生華林園園承惠成以聞又生樂游苑正陽堂前池大府卿王峻以聞華山駿鹿湘洲鸚鵡漢書曰成帝元封元年用事于華山至中嶽獲駿鹿周書曰鹿若疾走漢書音義曰楚人謂麋為鹿宋記曰文帝元嘉二十一年湘洲獻白鸚鵡詔群臣並為賦何龜八眼何鳥沒羽帝王世紀曰堯時憔憢民貢沒羽鳥也宋書曰明帝太始元年八眼龜見吳興郡太守禇淵以獻雁何為歌鸞何為舞漢書曰宣帝立世宗廟告詞孝昭有五色雁集殿前作獲雁之歌山海經曰軒轅之國請之野鸞為歌又曰女林之山有鳥狀鶴名之曰鸞見天下安平又曰鸞鳥鳳之佐鳴中五音肅肅雍雍喜則鳴舞人君行步有容祭祀有禮親疏有序則至橘實十二柰蒂十五晉中興書曰咸和六年平西將軍庾亮送嘉橘十二實一蒂亦嘉禾之流晉起居注曰太始二年嘉柰生一蒂十五實鵲曷巢共燕曷豆吐曹植魏德誌曰有白鵲見焉古今注曰漢成帝建始四年白鵲與駿鵲共巢長安人家又章帝元和元年見厭次晉起居注曰二年白鵲見東萊趙贊以獻宋書曰文帝元嘉廿二年白鵲見新野又曰孝武帝大明六年汝南獻白鵲史記曰漢時平陽出白鵲鷰霍光生褚先生曰黃帝終始傳云漢興百餘年有長出白鵲之鄉村天下之政霍光生喬燕卵并燕吐豆二事爰蕭集菀其鳥成文孫氏瑞應圖曰爰蕭鳳之屬西方之禽也禮斗威儀曰人君乘土而王其政太平則鳳皇爰蕭集於林苑臨海異物志曰其鳥五色成文丹喙赤頭頭上有冠鳴曰天下太平王者有道則見獸何為言鳥何為耘孫氏瑞應圖曰趹蹄者后土之獸也自長言語王者仁孝于萬民則來夏禹治水有功則至墨子曰禹葬會稽鳥為之耘帝王世紀曰禹葬會稽有群鴈見民耘則拔草根發喙除其機故謂之耘也象耕舜葬鸞棲儲墳墨子曰舜葬于蒼梧之野象為之耕謝承後漢書曰方儲母終負土成墳鸞棲其墓樹抱日之氣覆鼎之雲孝經援神契曰黃氣抱日輔臣納忠德至于天日抱戴也在上曰戴在旁曰抱漢書汾陰巫錦姓名為人祀魏睢廟旁見地如鉤狀掊視得鼎祀祠迎鼎至甘泉晏溫之極有黃雲覆其鼎上襄陽蒼鳥秦郡白鵲孫氏瑞應圖曰人君脩行孝經被于百姓則蒼鳥至宋書曰孝武帝大明元年有蒼鳥見襄陽王玄謨以獻梁天監起居注曰八年秦郡太守元長言郡人神延祖見白鵲巢鳥群集其側因獲之以獻也玄龜負書赤魚遊鑊尚書中候曰堯沉璧於洛玄龜負書而出背甲赤文成字止於壇魏文曰文帝欲授禪赤魚遊露鑊綦母氏注魏都賦延康元年見山陽白鳩京師青雀襄陽耆舊傳曰黃穆為山陽太守有德白鳩見宋紀曰孝武帝大明六年青雀集華林園宋書曰明帝太始三年青雀見京師城內南徐州剌史桂陽王林範以獻赤雕孤下白魚雙躍尚書中候曰有火自上覆於王屋流為雕其色赤其聲魄也馬融曰雕鳶屬也象武王伐紂也王肅曰雕如字尚書大傳曰武王渡河中流白魚雙躍入舟武王俯取以祭泣曰鱗介之物兵象也白者殷家之正言殷以兵眾興也黃金生碑紫玉為爵晉紀曰武帝太始二年繁昌縣有魏文帝受禪碑黃金生焉禮斗威儀曰人君乘金而王其政聲平則紫玉見於深山熊氏瑞應圖曰王者不藏金玉生光於山宋書明帝太始二年于赭杼藏南得紫玉圍三尺長一尺厚七寸太宗以為二爵獻于文武二廟齊之黑獸晉之白狢齊書宋人奏始末武陵有黑獸見一角羊頭龍翼馬足父老咸見之莫識晉起居注曰武帝時獲白狢牛生厥石狗養斯肫京房易占曰兵強主武則牛生石地鏡曰時勢安敬則狗生肫而養白雉獻聖玄鶴報恩典略曰白雉者岱宗之精也出於盂山抱樸子曰九真越裳有之尚書大傳曰周成時越裳氏來獻白雉曰吾聞國之黃耇曰天無烈風淫雨江海不波溢于茲久矣意中國有聖人盍往朝之故重三譯而至東觀漢記曰光武建武二年南越獻白雉八公相鶴絰曰粹墨如漆也其壽滿三百六十歲則色純黑也孝經援神契曰玄鶴為人所射歸噲參參養療之後雌雄各銜一明珠來報陸生蓮花江出大貝梁大同起居注曰二年廣州陸地生蓮花刺史蕭勵送與草堂寺釋慧約慧約以聞尚書大傳曰大貝則自江出也大若車渠春秋運斗樞曰搖光得則吐大貝孝經援神契曰王者德至泉則江出大貝六韜曰文王拘於羑里散宜生之江淮得大貝如車渠以獻紂免西伯之難長山之龜揚海之解沈約宋書曰明帝泰始六年六眼龜見東陽長山卦爻也齊書曰武帝永明二年四月長山縣王惠獲六眼龜一頭腹下有萬歡二字并有卦兆郭璞註爾雅曰吳郡陽羨縣君山上有水池池有六眼龜周書王會曰成王時揚州獻大解注曰揚州東海也並出解解即蟹也羊衘其穀鳥讓其庭廣州記曰裴淵于廣州廳事梁上畫五羊象又作五穀囊隨羊懸之云昔高固為楚相五羊衘草於其庭於是圖其象南越志曰任囂尉佗之時有五仙騎五色羊執六穗秬以為瑞因而圖之於府廳交州亦然古文瑣語曰晉平公時有鳥從西方來白色皆備有鳥從南方來赤色皆備集于庭前相見相讓叔向曰吾聞師曠曰西方有鳥白質五色皆備其名曰雞其來為告臣之之祥大蚓虹舒天螻羊形河圖說命徵曰黃帝土德故先是大蚓之應呂氏春秋曰黃帝時天見大蚓如虹應劭曰螾丘蚓黃帝土德故地有神蚓大五六圍長十丈黃者地色螾赤令黃故為瑞也呂氏春秋曰黃帝土德先天見大螻黃帝曰土氣騰土氣騰故其色尚黃其事則土也高誘曰螻螻蛄也河圖曰黃帝起有大螻也見六足名曰散福野王按爾雅曰殷天螻天螻即螻蛄也以事而推非其羊者也搜神記曰廬陵太守龐企字子及自說其祖非罪繫獄獄牆有螻蛄蟲行左右因謂之曰爾若神活我因投飯與之食食盡去去而復來形稍大數日如羊及當行刑螻蛄夜掘壁成孔乃破獄而出龐氏自此世祠螻蛄焉鴈何為赤鳥何為青漢書曰武帝太始二年幸東海獲赤鴈作赤鴈之歌孫氏瑞應圖曰成王之時治道太平有青鳥見大如鳩色如翠琴操曰孔子與子夏等六十四人講道德有赤氣貫天魯端門有四書遣子夏往視之果有四書子夏寫之隨書飛為青鳥還以視孔子孔子曰赤氣巳前春秋孔演圖曰血飛為鳥化帛書鳥消書出署曰孔演圖帝葉光紀制子精也抱珥之日同色之星孝經援神契曰日抱珥則人壽孫氏瑞應圖曰五星同色皆黃也五星同色天下偃兵百姓安寧歌舞已行五色之鳥三角之鹿漢書曰宣帝元康三年詔曰今春五色鳥以萬數屬縣飛過翱翔而舞欲集不下令三輔春夏無得以摘巢探卵彈射飛鳥者也崔豹古今注曰漢明帝永平九年有三角鹿見於江陵陽翟雨稻陳留雨榖古今注曰漢惠帝三年桂陽翟宮俱雨穀米也漢書曰宣帝元康四年嘉穀降于郡國王充論衡曰漢光武建武廿一年陳留穀雨卑以稗開陽之柱比閭之木漢官儀曰開陽門始成未有名夜有一柱來止樓上瑯琊開陽縣上言南門下柱飛去因㓨記年月于其門或曰七寶生亍酒泉郡周書王會曰成王時白州獻比閭比閭葉若羽伐其木以為車終日行而莫盈洛池玉雞太液黃鵠孫氏瑞應圖曰玉雞瑞器也王者至孝則至一本云王者道德合神明則出帝王世紀曰漢昭靈后含始遊洛池有玉雞含赤珠名曰玉英吞此者王始吞之生高祖漢書曰始元元年黃鵠下建章宮太液池中珠出於海玉生于谷孝經援神契曰王者德至淵泉則海出明珠宋均曰夜照暗也禮稽命徵曰德禮之制則澤谷之中有白石白玉宋均曰兌金倅也色白與金同出山也璽字萬年印文萬福晉中興書曰元帝建武元年江陵人虞迪墾田得白玉麒麟紐璽一以獻文曰長壽萬年齊書曰典河黃慶宅左有園種菜鮮異采拔隨後更生夜恒有白光似懸道士傅德占使掘之三尺獲玉印文曰長承萬福臨院之榴永嘉之竹晉降安起居注曰三年武陵臨院縣有安石榴六子同頴內史庾怡以聞梁起居注曰天監五年衛將軍蔣仲顯表其家有石榴四子同蒂淮南子曰太清之始世也明照于日月與造化相雌雄天覆以德地載以樂甘露下竹實滿高誘曰滿成也王隱晉書曰武帝太始以來永嘉有竹實之瑞晉紀曰阮藉見孫登于蘇門山有竹實數百斛枯木誰字冬笋誰哭齊書曰永明元年秣陵安明寺有枯木伐以為薪木裏自然有法大德三字楚國先賢傳曰孟宗母嗜笋冬節將至笋尚未生母思之宗入林哀哭笋以為之生寶珪河上玉英巖間春秋曰昭公二十四年十月癸丑子朝用成之寶珪於河禱河求福甲戌津人得諸河上珪自河出梁天監起居注曰華山陶隱居采芝巖間得玉英一枚也府吏得鉤王母獻環東觀漢記曰桓帝永興二年光祿勳府吏舍壁下忽有青氣得玉鉤一枚鉤長一寸三分玦周五寸四分身皆雕鏤孫氏瑞應圖曰黃帝時西王母獻白環禮三朝記曰舜時西王母又獻白環星既連珠日將五色易神靈圖曰王者德至時五星若連珠京房易占曰聖王在上則日光明五色備具燭曜無已又云大光天下和平上下俱泰金勝明功根車表德孫氏瑞應圖曰世無盜賊則金勝出晉紀曰永和元年陽穀得金勝一枚長五寸狀如纖勝桓溫平蜀四夷賓服孝經援神契曰王者德至山陵則根車出宋均曰山木根車象也應養載萬物兔何為白兔何為赤典略曰兔月白之精也晉中興書曰白兔蓋神獸也抱樸子曰兔壽千歲滿五百歲則其色白也晉中興書曰王者尊敬耆老則白兔出東觀漢紀曰光武建武十三年越裳獻白兔又曰魯平為趙郡六年頻降瑞嘉白兔見城內孫氏瑞應圖曰赤兔瑞獸王者德盛則出熊氏瑞應圖曰說與白澤同盛德愽施聖王豋祚厥集白澤亦臻赤兔澤及靈智辨類識故神雀翔集文狐繁息東觀漢記曰明帝永平十七年神雀五色翔集京師帝以問瑞邑侯劉復不能對薦賈愽物對曰昔武王脩文之業鸑鷟鳴于岐山宣帝威懷戎狄神雀仍集此降之徵也敕蘭臺給筆作頌班固神雀頌曰戴文履武玄黃五色熊氏瑞應圖曰文狐狐之有文章者不貪則至其九尾者子孫繁桑樹櫓生柳葉蟲食後漢書曰陳字文鍾為巫令有政能桑櫓生三萬餘株民已溫飽漢書曰昭帝時上林樹斷臥一朝起立生枝葉為蟲食其葉文字曰公孫病已花雪集衣甘露降盤宋紀曰花雪降謝莊下殿雪集衣白上以為瑞公卿並賦花雪詩孫氏瑞應圖曰王者德及天則甘露降廣雅曰湒瀼瀼泥露也和氣通津為露漢書曰武帝作銅承露盤仙人掌擎玉杯取雲表露和屑玉服封中雲起洛上帝觀漢書曰武帝封泰山禪夜有光晝有白雲起封中帝王世紀曰黃帝五十年七月庚申天下大霧三日三夜霧除帝遊洛水之上大魚負圖而出今河圖帝觀篇也俞兒導伯老人主安管子曰桓公壯伐孤竹未至果耳漢十里授弓將矢射未敢發見一人長尺而人物備共冠右祛衣走馬管子曰臣聞登山之神有俞兒伯王之君興則走馬前導祛衣其前有頃果如其言孫氏瑞應圖曰老人星見則主安不見則兵起春分見卯秋分見丁八文之狐五音之鸞周書王會曰成王時青丘獻九尾狐禮斗威儀曰人君乘火而王政頌平則南海輸八文狐白虎通曰狐死首丘不忘本也明安不忘危也必九尾者九德也其子孫繁息也山海經曰鸞鳥鳳之佐鳴中五音也孔雀新昌鸚鵡林邑宋紀曰孝武帝大明五年新昌獻白孔雀臧榮緒晉書曰安帝義熙十四年林邑獻白鸚鵡昆吾切泥玉盃明汁列子曰周繆王時西戎獻昆吾之劍切玉如泥孔叢子曰秦王得西秦之刀割玉如割木十洲記曰周繆王時西戎獻玉盃光照室至庭中明水汁滿盃甘而香美斯之謂靈器白琯來獻銀甕不汲大戴禮曰舜時西王母獻白琯說文曰漢章帝時零陵文奚景于洽道舜祠下得白琯孝經援神契宋均注云銀甕者不汲自滿一名平甕又曰神靈滋液百珍寶用有銀甕見孫氏瑞應圖曰刑法中民不怨則銀甕見也文犀駭雞冠雀銜鱣抱樸子曰駭雞者犀之神靈也其角有通天文雞見之驚駭故一名通犀有一白理如綖者是也以盛米置雞所欲啄米大驚得角一尺作魚啣入水水開三尺孫氏瑞應圖曰王者賤難得之物駭雞犀出田俅子曰周武王時倉庭國獻文章騶孝經援神契曰神靈滋液百珍寶用有駭雞犀也宋均曰其角光雞見駭之今之通天犀也曰瑇瑁魚犀戴通以和章范曄後漢書曰楊震客於湖有冠雀銜三鱣魚飛集講堂前都講取魚進曰虵蟺者卿大夫服之象也三者法三台也先生有此昇矣年過五十六事州郡印字真帝璽文受天齊書曰高帝建元四年張慶直買瓦作屋又于屋間見赤光照內外慶直乃告乃休光乃發視獲玉印一方八寸上有鼻文曰真帝江表傳曰吳烈帝軍于洛陽南甄官井上足有五色氣舉軍人怪之莫敢汲令人浚杼得傳國璽文曰受命於天既壽永昌方圓四寸交五龍上有一角之缺十頴如積五穀有年晉中興書曰或異敏同頴或滋連數穗或一稃二米以應質文也晉書曰愍帝建興元年八月嘉禾生于農襄平一莖七穗二年生于平州三穗同莖廿三年生于華林蔬圃之庭十頴一莖參差如積此見任務靈果頌禮斗威儀曰人君乘土而王其政升平則嘉禾並生禮含文嘉曰綏和五年明五禮則五禾應以大豐禮稽命徵曰天子祭天地六宗得其儀則五榖豐熟為之有年春秋曰魯桓公三年齊侯使其弟年來聘其年注曰五榖皆熟有年又曰桓公十六年大有年漢書曰宣帝元康四年歲豐政平黃金弄玩碧石禮斗威儀曰人君乘金而王其政象平則黃金光於深山孫氏瑞應圖曰王者不藏金玉則黃銀光於山孝經援神契曰神靈滋液百珍寶用則碧石見孫氏瑞應圖曰王者玩弄之物不用則碧石見于山也盧江玉鼎錢塘蒼璧晉陽秋曰成帝咸熙八年榖成縣民留珪見夜夜門有光取得玉鼎一枚圍四寸廬江太守路承獻著作郎曹毗上玉鼎頌齊書曰武帝永明七年吳郡太守江教於錢塘獲蒼玉璧以獻之十六枚磬三萬觔錫漢書曰成帝時獲得玉磬十六枚議者以為善祥劉向因此說上宜興郡雍梁起居注曰普通四年南兗州刺史豫章王宗表于上步埭白田獲錫三萬觔潤五千觔胡為嘉粟胡為岐麥毛詩曰貽我來麰漢書曰來麰大麥始自天降以致和平獲天助也梁起居注曰大同五年隋郡太守馬狥送三岐麥三穗胡為嘉粟胡為玄稷梁起居注曰大同五年始平太守崔碩上言嘉粟一莖十七穗漢書曰宣帝神雀元年詔曰乃元康四年玄稷降於郡國玄稷黑黍也昌蒲之花扶老之藤梁書曰大帝少時常見菖蒲花光采鮮麗冠絕眾花汝南先賢傳曰蔡從字君仲至孝所居井桔槔歲久欲碎為母病於是憂不敢動搖宿昔生扶老藤一莖鳩巢其上秠稻生疇黑芝出陵梁大同起居注曰年神農太守劉士梁言所部高活唐戴二子創稻苗孳茂一子乃有兩頭三穎時得一秠兩米又見二粒同生一蒂者渠搜犬鼠河圖龍馬周書王會曰成王時渠搜國獻犬鼠犬鼠者露犬也能飛食虎禮記曰聖人用民必從天不愛其道不藏其寶故河出馬圖注曰龍馬負圖也尚書帝命驗曰勤世者愛馬受宋均曰勤世者勤勞應世也馬若堯時得龍馬負圖也孔安國尚書大傳曰王者有仁德則龍馬見伏羲之世龍馬出河遂則其文以畫八卦謂之河圖也植桂鳴官樹起社春秋潛潭巴曰官桂鳴下吐諸侯號宋均曰有聲陌曰桂好木植于宮中猶天子封有聲為諸侯也今乃鳴是以聲名于下土之祥也漢書曰邑王門社有枯樹復生枝葉眭孟以為木陰類下民象當有廢故之家公孫氏從民間受命為天子者後宣帝立帝本名病已故蟲食葉成文字云公孫病已立也雀何黃玉黍何鬱金春秋孔演圖曰孔子論經會黃書有鳥化為書孔子奉以言書天赤雀集上化為黃玉㓨曰孔堤化應法為赤制亦雀集宋均曰特授命之制應也孫氏瑞應圖曰鬯者釀黑黍為酒雜芬蕓之草和鬱金之黍故亦曰鬱鬯所以灌地降神也謂王者盛德則地出秠可以為鬯黑鳥叶帝翠羽耀林尚書中候洛誥曰塲觀于洛降三分之璧退主榮光不起黃魚雙躍黑鳥以落隨魚亦止黑帝叶光紀之使也為黑玉赤勒日玄精天乙受神之福命予伐桀克于湯滅夏而天下服孝經援神契曰神靈滋液百珍寶用翠羽耀宋均曰翠鳥之羽有光耀林山海經曰孟山有白翠何為雄毛何為同心孝經援神契曰神靈滋液百珍寶用有野雄毛宋均曰猛鳥也敢鬭其尾可以為冠飾服猛也如今侍中著貂虎貢鶡尾是也孫氏瑞應圖曰王者德及四方遐夷合同心鳥至熊氏瑞應圖曰謂齊心鳥亦是也銜鉤之狼巢閣之鳳孫氏瑞應圖曰湯時有神牽白狼口銜金鉤而入殿庭郭璞贊曰矯矯白狼應符虎質乃銜靈鉤惟德是出帝王世紀曰堯時鳳皇止庭巢于阿閣佳樹又曰黃帝遊滬洛上與大司馬容光等觀鳳皇銜圖置帝前胸戴德頭揭義背負仁翼挾火音中律呂信足履文尾擊武音中金石神魚舞河神雀集雍漢書曰宣帝元康四年濟河天氣清淨神魚舞河又二年神雀集雍頌曰戴文履武五色玄黃爰降爰止來集來翔王濬白蝟韓侯黃熊宋書曰文帝元嘉廿四年揚州刺史始興王濬獻白蝟周書王會曰成王時東胡獻黃熊韓詩曰宣王中興韓侯為伯日蠻退陌獻其黃熊也六符階平再中鳥嬉漢書曰六符三台也三階平則陰陽和風雨時黃帝泰階六符經曰天子上階諸侯公卿大夫中階庶人下階上星為男主下星為女主中星三公諸侯下元士庶人泰階不平則五神無祀易經備曰日之再中烏連嬉也人君仁聖則出之也三苗貫桑五極如旗周書曰成王時苗三貫桑苗同為一穗意者天下為一乎越裳果重譯而至尚書帝命驗曰日月之房惟參烏龜令信予明旗星出令之明謂有天子之氣旗星有光明之星也謂五星也以一隅言之本紀曰歲火紀曰熒惑墨子曰五星光明苣艷如旗奚為紫脫奚為金芝禮斗威儀曰人君乘土而王其政太平則紫脫為常生孫氏瑞應圖曰王者仁義則紫脫見梁起居注曰九年金芝廿八莖生平水署少府卿蕭芬以聞四角之羊四眼之龜宋均曰孝武帝大明二年河南王吐谷渾拾演獻四角羊宋書曰明帝太始二年四眼龜見會稽太守巴陵王休若以獻齊書曰武帝永明八年六月建城縣田成田中獲四眼龜腹下有萬齊字黃魚濟壇青龍處洞尚書中候曰湯觀于洛降三分之璧退立榮光不起黃魚雙出濬于壇齊書曰武帝永明五年南豫州獻金色魚熊氏瑞應圖曰青龍者少陽之精也天地之苻也孫氏瑞應圖曰青龍乘雲雨而上下處于泉洞之中忠孝石印清廉玉甕博物志曰張顥為梁相雨後有鳥似山鵲飛翔近地令摘之墜地為圓石椎破得金印文曰忠孝侯孫氏瑞應圖曰玉甕瑞器也不汲自滿王者清廉則見也豹犬口鉅犀魚水開周書王會曰成王時匈奴獻豹犬豹犬鉅口赤身四窆𩟀秣三日也抱樸子曰通天犀角一尺㓨作魚銜入水水開三尺也曷為瑯玕曷為玟瑰孝經援神契曰神靈滋液百珍寶用即玟瑰齊宋均曰玉名齊潔好也胡為樟生胡為梓擢晉書曰王廙字世將為鄱陽太守有枯樟更生荀崧王敦表勸進中宗曰皓獸應瑞而來臻樹久枯而更生豫章記曰松陽門內有梓樹大𠦜五圍舉株盡枯永嘉中一旦忽更生榮茂大興中皇帝繼大業庾仲初陽都賦曰廆木薈于豫章郭璞曰南郊蔽梓擢秀祖邑胡為騶牙胡為角端史記曰漢時建章宮後閤重機中有物出焉其狀如麋問左右莫能知東方朔曰臣知之願賜美酒梁飯大飡臣乃言詔曰可又曰某所有公田魚池蒲葦數頃願陛下以賜臣乃言之詔曰可言之所謂騶牙者也遠方當來歸義故騶牙先見其齒前後若一齊等無牙故謂之騶牙其後一歲匈奴昆邪上將十萬眾來降孫氏瑞應圖曰角端獸也日行八千里能言語曉四夷之音明君聖主在位明達外方德被幽遠則奉書而至也赤烏成巢玄豹釋縛春秋元命苞曰赤烏陽之精也禮記命徵曰得禮之制澤谷之中有赤烏孫氏瑞應圖曰王者不貪天而重民則赤烏至宋書曰孝文大明五年見蜀郡剌史劉思孝以獻孝子傳曰吳從健為人也至孝母沒負土成墳廬于冡側有赤烏巢其門六韜曰散宜生至苑懷塗山得玄豹以獻紂免西伯之難周書王會曰成王時屠州獻玄豹雉何升鼎燕何背雀尚書大傳曰武丁祭成湯有雉飛昇而雊問諸祖己已曰雉者野鳥也不當升鼎升鼎者欲為用也遠方將有來朝者武丁思先王之道辮髮重譯者六國來王隱晉書曰元帝時三雀共登雄燕背三入東安府廳占者以為當三進爵為天子日月合璧龍鳥俱見易坤靈圖曰至德之朝日月連璧朔望最密日月如合璧五星如連珠漢書曰宣帝時東萊立孝文廟有大鳥跡竟路與白龍俱見鯉鈐之苻鮫旗之炫說苑曰呂望釣于渭渚淂鯉魚剖腹得書曰呂望封于齊列仙傳曰呂尚冀州人也釣于磻溪二年不獲比問曰可以止也尚曰非爾所及果得大鯉又得兵鈐于腹中孝經援神契曰神靈滋液百珍寶用鮫珠旗宋均曰鮫魚之珠有光炫可以餙旌旗虬何以驂鰩何以蜚師曠紀曰虬龍者龍之無角者也黃帝時有虬龍白前身有鱗角背有名字出圖史禁或以授黃帝淮南子曰女媧之世服應龍驂青虬山海經曰泰器之山覩水出焉是多鰩魚身黑翼蒼文而白首赤喙常行西河遊於東海以夜飛有音如鸞雞鸞雞未詳其味酸食之民狂見天下大穰翔風發生甘露表微尸子曰翔風瑞風也一名景風春為發生夏為長羸秋為收成冬為安寧禮斗威儀曰人君乘木而王其政訟平則翔風至孝經援神契曰德至八方則翔風至卦表嬉應不失八節鍾呂應不失氣音度舒應不失宮商爾雅曰四氣和為通正謂之景風論衡曰道至天則和風起孫氏瑞應圖曰王者和氣茂則甘露降于草木一本云嗜老得敬竹柏受尊賢容眾不失細微則竹葦受神仙傳曰軒轅之世民飽甘露清之野搖山之民甘露自領所欲飲者壽八百歲西壯海外有人長二千里兩腳間相去千里腹圍一千六百里促日頷天酒五石名曰無路人淮南子曰太昔清之始世也天覆以德地載以樂甘露下之石何生谷珠何出地禮稽命徵曰得禮之制則澤谷之中有白玉白石宋均曰兌金位也色白與金同出于山也孫氏瑞應圖地珠瑞珠也王者不以貨財為寶則地出珠三角迭來六足委至孫氏瑞應圖曰王者法度脩明三統得所則三角獸至天鏡曰王者承先王法度無所遺失則三角獸來孫氏瑞應圖曰王者謀及眾庶則六足獸至駮馬曷輸白貍曷致禮斗威儀曰人君乘火而王其政訟平則南海輸駮馬注曰黃赤馬天鏡曰王者不傷禽獸則駮馬見又曰人主恩被于四遠則白貍見文王時則見遠人服表柱鳴枯大木起悴齊書曰太祖改樹武晉舊塋表柱忽龍鳴響振山谷梁大同起居注曰十年上拜陵先時陵上有大樹一雙幹似青桐葉如丹桂積年凋悴御輦至一旦鬱然榮茂勝眾木也大貝之祥一角之瑞禮斗威儀曰人君乘金而王其政象平則海出大貝孫氏瑞應圖曰王者不貪則海出大貝貝自海出其大盈車也鄭玄曰古者以貝為貨又曰王者六合同歸則一角獸至熊氏瑞應圖曰天下太平則一角獸至齊書曰武帝永明十年鄱陽獲一角獸麟首鹿形龍鸞共色胡為玄狢胡為青熊穆天子傳曰天子獵于澡澤于是獲玄狢以祭河宗郭璞注曰以將有事于河奇以獲故用之道也周書王會曰武王之時不屠河獻其青熊也白虎衘肉黑狐尾蓬漢書曰宣帝時河東立世宗廟告祠日白虎衘肉置殿下孫氏瑞應圖曰王者政治太平則黑狐見周書王會曰成王時黑狐見山海經曰玄狐蓬尾注曰蓬茸也說苑曰蓬狐文豹之皮也姒氏薏苡成王梧桐禮含嘉曰夏姓姒氏女梽吞薏苡生禹春秋前傳曰循已既感流星又吞神珠薏苡以生禹禮斗威儀曰人君乘火而王其政訟中梧桐為常生宋均曰梧桐大家候興則為之生有禍殃則不榮菙也詩云梧桐不生于巖太平而后生于朝陽也孫氏瑞應圖曰王者任用賢良則梧桐生東廂注曰生于東廁瑞周書王會曰成王時梧桐生于朝陽注曰生山東曰陽也奚為漿露奚為循風晉陽秋曰廢海西公以馬繮絞煞三子三子死之日南山獻甘露頌賜公卿三子不獲嘗焉先是太和平中童謠曰青青衘路楊白馬紫游繮汝非皇太子那得甘露漿孫氏瑞應圖曰循風者八方之風應時而至立春之日則東方明庶風至春分之日則東南清明風至一名薰風立夏則南方景風至一名巨風夏至則西南方涼風至一名凄風立秋則西方閶闔風至一名颼風秋分則西北方不周風至一名廣風立冬則北方廣漠風至一名寒風冬至則東北方融風至一名飆風赤羆息佞白狐衰戎孝經援神契曰赤羆神獸也神靈滋液百珍寶用有赤羆宋均曰姦宄息佞人逐則赤羆出孫氏瑞應圖曰佞人遠姦宄息則赤羆入其國典略曰白狐者神獸岱宗之精也春秋潛潭巴曰白狐至則民利不至則下驕恣宋均曰狐陽精也白者神也清白則民受利焉不至君無治行故下驕孫氏瑞應圖曰王者法平則白狐至一本云王者明德動準法度則出宣帝時得之狄戎衰也東觀漢記曰章帝時白狐見群臣上壽晉錄曰武帝咸寧二年白狐九尾見汝南也白鹿千歲飛菟萬里晉中興書曰白鹿者神獸也若霜雪自有牝牡不與紫鹿為群抱樸子曰鹿其壽千歲滿五百歲則色白山海經曰出下申之山周書王會曰成王時黑齒貢白鹿國語曰王伐犬戎得白鹿辛氏三秦記曰平王時見白鹿因名其原孫氏瑞應圖曰飛菟者神馬之名日行三萬里夏禹治水勤勞歷年救民之災天其應德而飛菟來宋魚入舟秦龍德水宋書曰明帝泰始二年華林園天淵池白魚雙躍入御舟齊書曰昇明三年齊太祖詣官亭湖廟有白魚雙躍入舟孫氏瑞應圖曰黑龍北方水之龍也洛書曰黑帝起黑龍見史記曰秦文公獲黑龍自以為德水大烏悲淚三代髦尾范曄後漢書曰楊震改葬于華陰潼亭先葬十餘日有大烏高丈餘向震喪前俯仰悲鳴淚下霑地及葬畢飛去時人立石烏於墓側典略曰三王相代之馬皆陰精也在夏則騮馬黑身白髦尾在殷則驟馬白身黑髦尾在周則騂馬赤身黑髦尾也奇獸禎漢白鹿祉魏漢書曰宣帝神雀元年九真獻奇獸蘇林曰象也注曰駒形麟色牛角仁而愛人也魏略曰文帝欲於受禪群國奏白麋見也蒼鳥宋祖青狐周文宋紀曰高祖伐鮮畢圍廣固將拔之夜有大鳥如鵝蒼黑色飛入高祖帳從事胡番進曰蒼者胡色鵝者我也胡來歸我大吉祥也明旦攻拔之孫氏瑞應圖曰青狐神獸也六韜曰周文王拘羑里散宜生之宛懷塗山得青狐以獻紂免西伯之難玉龜孰辨玉羊孰分孫氏瑞應圖曰師曠時獲玉龜於河水之涯此為聖國出晉書曰懷帝元年有玉龜出於霸水孫氏瑞應圖曰玉羊瑞器也鍾律和調五聲當節則玉羊見又曰晉平公時師曠至玉羊又崔駰有玉羊之銘玉典孰器玉雞孰群孫氏瑞應圖曰玉典者瑞器也王者仁慈則玉典見又曰玉雞瑞器也王者至孝則至一本云王者道德合神明則出玉璜孰示玉璧孰云孫氏瑞應圖曰玉璜者瑞器也五帝應循玉璜出郭玄曰半璧曰璜尚書中候曰呂望釣于渭水獲玉璜㓨曰姬受命呂佐之搔搔理合德于今昌來提提取撰爾雅令報在齊撰述昌用起發遵題遵脩題號五百世姜呂霸世遵姬攜晉中興書曰玉璧仁寶也不琢自成光若明月孫氏瑞應圖曰王者賢良美德則玉璧出魏志曰遜帝武熙元年鎮西將軍衛瓘上言雍州兵于成都得玉璧一枚宋書曰孝武帝大明元年江垂人朱伯得玉璧一枚徑寸五分以獻梁天監起居注曰元年臨海太守伏曼容于天台山澗水中得玉璧一枚徑七寸九分光眼潤于巧精奇熒惑不變太白合表孝經援神契曰熒惑不變世和從通宋均曰不變謂見伏應度色從時也又曰太白合表四夷從宋均曰合表從中道也太白進退主候兵今從中道無進退是夷服其兵鎮星鉤鈐大電斗繞孝經援神契曰鉤命決曰蒼帝出鎮合鈐兌位昌注曰赤帝緯聚於東井昌元見其軫也黃方矢射注曰黃帝出柱矢射射流也河圖曰大電繞斗北樞星照郊野感苻寶生黃帝正四輔後嗣七九宋均曰塸土也四輔輔正四時者也蒼璧出郢玉牟獲師宋書曰明帝太始五年郢州獲蒼璧廣八寸五分安西將軍蔡興宗以獻孫氏瑞應圖曰師曠時獲白牟應龍黃野大鱸翠溈山海經曰應龍龍之有翼者也居南極犂牛之山𧈪尤伐黃帝帝命應龍攻之冀州之野應龍畜水𧈪尤請風伯雨師縱大風雨黃帝乃下天女曰雨止遂殺𧈪尤河圖曰挺輔佐黃帝五十四年天老曰河出龍圖洛出龜書紀帝錄州聖人所紀姓號與謀治平然後鳳皇處之其授帝圖乎黃帝乃時祭七日七夜黃冠黃冕駕黃乘載之翟翟旗天老五聖皆從以遊河洛之間至翠溈之淵大鱸魚泝流而至問天老曰見天中流者也曰見之顧問五經皆見乃辟左右獨與天老遊之天老跪而授之其包畢見魚沉帛圖蘭葉朱文以投黃帝黃帝舒視之名曰錄圖告黃帝後世傳代謹藏勿泄萬夫圖歡以屬軒轅青麞表異赤燕應時宋起居注曰文帝時獲青麞熊氏瑞應圖曰王者八節有序經緯齊差應時之性今則赤燕衘書而至又師曠時衘書而來群翔之鶴一角之龜梁大同起居注曰十年上拜陵還至查硎百僚拜候有鶴蔽日羅列成行且鳴翼從入宮漢書曰武帝後元元年詔曰朕交見上帝游於北邊見群鶴留止不羅網靡所獲獻于時太平梁天監起居注曰十一年六月安豐縣獲一角玄龜也白烏曰陽玄貝曰貽典略曰白烏太陽之精也徐整三五曆序天地之初有三白烏主生眾烏孫氏瑞應圖曰宗廟肅敬則白烏至漢書曰章帝元鳳三年冠石之祥有烏數千集于旁成帝河平四年白烏集孝文廟下黑烏從明帝太寧元年吳郡獻白烏東觀漢記曰章帝元和二年王阜為益州牧白烏見周書王會曰成王時羗人獻玄貝貽貝也一名貽郭璞曰黑貝也何花之勝何璣之鏡漢書曰皇后入廟朝先王花勝上有白鳳翡翠毛熊氏瑞應圖曰文璣如蜃有光耀可以如鏡何台歛坼何虹誕聖晉陽秋曰張亡後中台遂圻太元中還復合正中國謝太傅為相之所致也詩含神霧曰握登見大虹竟天意感生舜於垗墟駿馬輸海神馬鳴門禮斗威儀曰人君乘火而王其政象平則南海輸駿馬文狐孫氏瑞應圖曰王者不貪禽獸則南海之駿馬見孝經援神契曰王者德至山陵則澤出神馬隨巢子曰三苗大亂天命殛之夏后受之無方之澤出神馬四方歸之晉書曰魏末有馬夜過官牧邊鳴眾馬皆應之明日見其跡大如斗行數里入海又曰懷帝六年有神馬鳴城南門瓠子同蒂桂樹有繁大同起居注曰梁州進瓠子異體同蒂禮斗威儀曰人君乘金而王其政象平則桂為之常生汝南先賢傳曰應從仲為東平太守事親篤孝惠澤洽著忽有桂於庭粲然繁茂百姓瞻仰歸養者什三四生魚之鼎斬蛇之劍王肅表曰文昭之廟魚生于鼎臣聞之易曰中孚豚魚言信及豚魚又鼎元吉彖曰鼎象聖人以享上帝史記曰高祖以亭長為縣送驪山徒多道亡道豐西澤正飲被酒夜經澤令一人行前行前報曰前有大蛇當徑願還高祖曰壯士行何畏乃拔劍斬蛇分為二逕開行數里醉臥後人來至蛇所見一嫗哭人問曰何哭曰傷吾子故哭人曰嫗子何為見殺曰吾子白帝子化為蛇當道今赤帝子斬之人以為嫗不誠欲笞之忽不見人司瑯玕龜送洪範莊子注曰積石千里河海出其下鳳皇居其上天為生食其樹名瓊枝高百廿仞大周圍以瑯玕為寶天生故為離珠一人三頭遞臥遞起以司瑯玕世紀曰舜即天子位洛出龜六十五字是為洪範所謂洛書也熊氏瑞應圖曰蒼頡與黃帝南巡狩登南墟之山臨乎玄扈洛汭靈龜負圖丹甲青文以授之頡因作書天何有光日何無主宋書苻瑞志曰元嘉十八年七月天有黃光洞照于地何承天等奏謂之榮光太平之祥也禮斗威儀曰人君乘土而王其政太平則日五色無主宋均曰苞五行之色不主于一也京房易傳曰聖王在上則日光五色備又云日者至陽之象君玄黃照耀則五色無主露降如雪物化為土宋書苻瑞志曰文帝元嘉中甘露頻降狀如細雪庾蘊瑞應圖曰王者德及遠方則物化為土王本紀曰蜀王獵于褒谷秦王以金遺蜀王蜀王報以禮物盡化為土秦王大怒臣下拜賀曰土地也秦得蜀矣果平蜀何雷火雀何日字王尚書中候曰秦穆公出狩咸陽天震大雷有火下化為白雀銜丹書入公車公俯取書書曰秦伯霸也春秋潛潭巴曰君德應陽君臣和得道度則日含王字曰含王孝也日中有王字者德象日光所照無不及矣氣浮于佳月揚于光後漢書曰蘇伯何遙見春陵城郭璞曰佳氣哉鬱鬱蔥蔥光武受命之苻也孫氏瑞應圖曰君不假臣下之榷則月揚光又曰王者動不失時則月為之揚光厥生慶山厥出流黃孫氏瑞應圖曰慶山者王德茂盛則生淮南子曰盛德之君仁恩廣大則流黃出高誘曰流黃土精也升山之神酌泉之人管子曰霸王之主興升山之神見孫氏瑞應圖曰王者理訟淂所則醴泉出於京師有仙人以酌之玄丹陵阿赤草水濱孝經援神契曰王者德至山陵則陵出玄丹孫氏瑞應圖曰王者循至仁則山出玄丹又曰王者不竭采色則出東觀漢記曰光武中元元年祀長陵醴泉出京師又赤草生于水涯蒙泉出岫大樹生闉禮斗威儀曰人君乘土而王其政太平則蒙泉出於山宋均曰小水出于山可以灌溉則土不殖也京房易傳曰君德強且昌則木生城一夜一圍上長數丈此謂城強氣成龍虎露降竹葦史記曰沛公上氣皆成龍虎五色此天子之氣也楚漢春秋曰沛公上氣五色衝天似龍似雲此非人臣之氣者也晉中興徵祥說曰王者尊賢容眾不失細微則竹葦受甘露椒桂合成穀櫟連理春秋運斗樞曰椒桂合生剛柔陽注曰椒桂陽星之精所生猶連體而生者椒桂芬芳美物若文王與呂望剛柔合計揚舉王功作祥也宋書苻瑞注曰文帝元嘉中有穀櫟二樹連理白虎通曰王者德至草木則木連理孫氏瑞應圖曰王者德化洽八方合為一家則木連理又曰王者不失民心則木連理何木生屋何木生水京房易傳曰君有德生聖子則木生君屋上及朝廷也地鏡曰國益地理則木生於水又曰國理君有喜則樹忽自大也麟從日度鳳窆律紀春秋命歷序曰六星之世駕飛麟從日月注曰飛麟麟有翼能從日月者循其度呂氏春秋曰黃帝聽鳳皇之鳴以別十二律紀也奚龍儛河奚龜庭際禮斗威儀曰人君乘木而王其政升平則交龍洮於河魏文帝雜事曰黃帝錄圖五龍儛河此應聖賢之圖苻也春秋孔演圖曰文命將興龜穴庭際而幽昌肅敬發鳴焦鳴者也瑞應圖曰幽昌狀似鳳皇銳喙小頭大身細足脛翼若郄葉身短戴義翼信膺仁負禮至則旱之應也又曰肅敬狀如鳳皇銳喙流翼負尾身禮戴信嬰仁膺智見則荒歉之應也又曰發鳴狀似鳳皇鳥喙大羽翼大足脛身短戴仁嬰義膺信負禮至則兵喪之應也又曰焦鳴狀似鳳凰鳩喙專刑身信嬰禮膺仁負智至則水之應也四鳥狀皆似鳳皇亦非嘉瑞以水旱之感今載者將辨非鳳皇而已
