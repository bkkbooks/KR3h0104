body:
  text: 跋跋夫國之興也必見禎祥國之亡也必見妖孽怪之說子所不語禎祥之事載諸圖牒以彰君德而昭示萬代者也夫乘天者莫若龍故應龍為祥乘地者莫若馬故神馬為瑞彰德也若兆聖者莫若麟故麒麟見翼聖者莫若鳳故鳳皇降其餘草木鳥獸山河玉石皆臻其瑞故羲農唐堯已上大瑞無歲無之洎于魏晉梁齊而下中瑞下瑞有時有矣皆見書于史氏而光瑞應者富矣庶矣魏晉之祉實繁其徒其所異者玄石圖而已今疏于下冀覽者究其本歟王隱晉書瑞異記曰劉向五行傳云魏年有和當有開石出於三千餘里繫五馬其文曰大討曹延康黃初之際張掖柳谷有開石馬始見于建安形成于黃初文備于太和其石狀象靈龜宅于川西嶷然盤峙廣一丈六尺長一丈七尺一寸周圍三丈八寸西南角高四尺西面高七尺西北角皆高四尺東際與地平蒼質素章鳳皇龜龍煥炳成形文字粲然斯蓋大晉受於聖德兼諺之應也麟驨翔鳳白鹿仁虎騊駼欣庭玉匣玦璜與文交焉麒麟屬歲星歲星主仁仁德宣流故麟驨列于東鳳皇之類屬熒惑熒惑主禮禮制得故鳳翔于南白虎之類屬太白太白主義八方向義故白虎見於西宗廟牲牷屬辰星辰星主信祭祀明信故神牛陳于北政教之類屬鎮星鎮星主德德道明故龍馬銜匣陳圖于中央神馬四者象司馬宣景文武創帝業也蒼白色者西方之色言龍興尚金白也爾雅曰驨如馬一甫不角者曰麒麟之屬瑞應之獸也今既驨有麟使仙人乘麟而華華蓋此則天之使者圖書瑞應以告言當受終也驨之為言與神為鄰提之為言與神為鄰仙人者言德合天地遷于人也鳳者天下太平則見言平蜀美天下一統白虎白鹿國之色也天下將和為一則一角獸為瑞玦者決疑言曹氏傳而無疑武帝亦決疑而受故有二玦也珮者王象言聖人口一明也珮之制上有白衡下有雙璜者周文於磻溪而受玉璜明大晉大德侔周也大金馬之前有白玉匣其蓋開而闔匣上有王字者此則天授大馬創其西方銜負白玉之匣開示圖象也昔聖帝授圖並以玉為匣匣南五字上下三大王者詩云惟此文王實始翦商文王三分天下而有其二故三王也大討曹者討曹之違也述大金者金是晉之所尚述謂遵循言大晉追述唐虞故事也金也金但取之者言曹氏運盡大晉受金命而取之又有十金者言金王當十世也六中者頴川府君至武帝凡六世世著功德也又中大金馬者元言武帝于司馬之中功德最大也壽者大吉也又有甲寅述水者公孫淵反在甲寅之前宣帝乃伐之越遼海而往還也斯實晉氏之大瑞矣魏氏春秋漢晉春秋及張掖太守所上圖搜神記及程猗瑞校此圖大同而小異諸圖故不徧書書其篇目而已
