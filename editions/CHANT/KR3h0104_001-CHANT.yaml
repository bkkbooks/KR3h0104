body:
  text: 稽瑞自敘稽瑞自敘方今元日朝會上公上壽已文部尚書奏天下瑞凡四辨其名數曰大曰上曰中曰下公卿大夫畢賀而退惜其國家之大事帝王之休祥未列著述蓋闕如也遂徵諸圖史著稽瑞一篇考事以為對切對以為句并一對對下隨而解之往者隋顏之推賦稽聖一章凡數句之內辨識一事蓋詞多而事寡又非其文今之作一句一事其解則大者十餘家小者亦三四而已不求文理直紀休徵云維嵩白雲子劉賡書重刊稽瑞序子思子曰國家將興必有禎祥禎祥之事見於上世者不一自後世狐鳴篝火之術興圖讖緯書往往偽託是以聖君賢相戒在下不許言瑞要之天地靈異之氣日流行於宇宙而與人心相感召順氣應之則兆而為祥逆氣應之則化而為妖是則符瑞之見於世者不必侈其事而何可謂無其理也唐劉賡氏著稽瑞一卷廣徵載籍博紀休祥鍊事成文儷句以配又恐後之讀其辭而昧所自也并自為之注唐時去古猶近祕閣所藏多人間未見之本迄今按註中篇目半歸放失甚矣古書之不傳者多矣按是書亦見王厚齋玉海祥瑞類中徧徵各家書目俱不載曩時虞山陳君子準博雅嗜古購藏宋元槧本偶獲是書珍同寶笈即名其藏書樓曰稽瑞志喜也欲重刊行世會病歿不果今年春顧生湘購得之偕其弟浩校勘付梓屬余為序余作而歎曰善哉兩生之好古也是書歷千餘載以來不大顯於世其不就湮滅者幾希陳君欲傅之不果鳥知閡數歲而有兩生之竟其志耶甚矣古書之顯晦亦有其時也然則其不傅者亦未遇其人耳傳不傅豈盡繫乎書之故哉至是書注中既詳言某代某朝則其瑞之為實為侈令讀者自得之其微旨有寓於本文之外然則其足傅者又不第補史冊之闕遺供文人之漁獵已也道光十四年太歲甲午冬十一月太倉季錫疇譔
